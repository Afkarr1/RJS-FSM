services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rjs_fsm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rjs_fsm
      DB_USER: postgres
      DB_PASS: postgres
      FONNTE_API_KEY: ${FONNTE_API_KEY:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
