server:
  port: 8080

spring:
  application:
    name: rjs-fsm

  datasource:
    url: jdbc:postgresql://localhost:5432/rjs_fsm
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.security: DEBUG